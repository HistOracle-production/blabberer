<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blabber Demo — Lip Sync Sprite Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      max-width: 900px;
      width: 100%;
    }

    .panel {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .panel h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 1rem;
    }

    /* Sprite display */
    #sprite-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover:not(:disabled) {
      background: #252525;
      border-color: #555;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.primary {
      background: #2563eb;
      border-color: #3b82f6;
      color: white;
    }

    button.primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    button.danger {
      background: #7f1d1d;
      border-color: #991b1b;
    }

    button.danger:hover {
      background: #991b1b;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 0.5rem;
      border: 1px dashed #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.85rem;
    }

    input[type="file"]::file-selector-button {
      padding: 0.3rem 0.8rem;
      border: 1px solid #444;
      border-radius: 4px;
      background: #252525;
      color: #e0e0e0;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.6rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
    }

    textarea::placeholder {
      color: #555;
    }

    /* Monitor */
    .monitor {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.8rem;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
    }

    .shape-badge {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #60a5fa;
      min-width: 2.5rem;
      text-align: center;
    }

    .energy-track {
      flex: 1;
      height: 8px;
      background: #252525;
      border-radius: 4px;
      overflow: hidden;
    }

    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
      border-radius: 4px;
      width: 0%;
      transition: width 50ms;
    }

    .energy-label {
      font-size: 0.75rem;
      color: #666;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      transition: all 0.15s;
    }

    #drop-zone.drag-over {
      border-color: #3b82f6;
      background: rgba(37, 99, 235, 0.1);
      color: #60a5fa;
    }

    /* Status */
    #status {
      font-size: 0.8rem;
      color: #888;
      padding: 0.5rem 0;
    }

    /* Audio player hidden */
    #audio-player { display: none; }

    /* Responsive */
    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Blabber</h1>
  <p class="subtitle">Lip sync sprite player — load sprites + audio to see it in action</p>

  <div class="main">
    <!-- Left: Sprite display -->
    <div class="panel">
      <h2>Preview</h2>
      <div id="sprite-container"></div>

      <div class="monitor">
        <div>
          <div class="energy-label">Shape</div>
          <div id="shape-display" class="shape-badge">X</div>
        </div>
        <div style="flex: 1;">
          <div class="energy-label">Energy</div>
          <div class="energy-track">
            <div id="energy-bar" class="energy-fill"></div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="play-btn" class="primary" disabled>Play</button>
        <button id="stop-btn" class="danger" style="display: none;">Stop</button>
        <button id="sample-btn">Use Sample</button>
      </div>
    </div>

    <!-- Right: Inputs -->
    <div class="panel">
      <h2>Input</h2>

      <div id="drop-zone">
        Drop sprite images + audio file here
      </div>

      <div class="input-group">
        <label>Sprite Images (shape_A.webp, shape_B.webp, ... shape_X.webp)</label>
        <input type="file" id="sprite-input" multiple accept=".webp,.png,.jpg" />
      </div>

      <div class="input-group">
        <label>Audio File</label>
        <input type="file" id="audio-input" accept="audio/*,.mp3,.wav,.ogg,.m4a" />
      </div>

      <div class="input-group">
        <label>Transcript (optional — improves lip sync accuracy)</label>
        <textarea
          id="transcript-input"
          placeholder="Enter the text being spoken in the audio..."
        ></textarea>
      </div>

      <div id="status">Load sprite images and an audio file to get started, or click "Use Sample" for a demo.</div>
    </div>
  </div>

  <audio id="audio-player" crossorigin="anonymous"></audio>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
