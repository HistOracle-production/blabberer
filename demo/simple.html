<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blabber — Simple Lip Sync Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .portrait-wrapper {
      position: relative;
      width: 400px;
      max-width: 90vw;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      background: #141414;
    }

    .portrait-wrapper img {
      display: block;
      width: 100%;
      height: auto;
    }

    #mouth-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      align-items: center;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover:not(:disabled) {
      background: #252525;
      border-color: #555;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.primary {
      background: #2563eb;
      border-color: #3b82f6;
      color: white;
      font-weight: 600;
    }

    button.primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    button.danger {
      background: #7f1d1d;
      border-color: #991b1b;
    }

    button.danger:hover {
      background: #991b1b;
    }

    .monitor {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      background: #141414;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      font-size: 0.8rem;
      color: #666;
      min-width: 300px;
    }

    .shape-badge {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #60a5fa;
      min-width: 2rem;
      text-align: center;
    }

    .energy-track {
      flex: 1;
      height: 6px;
      background: #252525;
      border-radius: 3px;
      overflow: hidden;
    }

    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
      border-radius: 3px;
      width: 0%;
      transition: width 50ms;
    }

    #status {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #888;
    }

    audio { display: none; }
  </style>
</head>
<body>
  <h1>Blabber</h1>
  <p class="subtitle">Simple lip sync demo</p>

  <div class="portrait-wrapper">
    <img id="portrait" src="./sample/sample.png" alt="Portrait" />
    <canvas id="mouth-canvas"></canvas>
  </div>

  <div class="controls">
    <button id="play-btn" class="primary">Play</button>
    <button id="stop-btn" class="danger" style="display: none;">Stop</button>
  </div>

  <div class="monitor">
    <span class="shape-badge" id="shape-display">X</span>
    <div class="energy-track">
      <div class="energy-fill" id="energy-bar"></div>
    </div>
  </div>

  <div id="status">Click Play to start</div>

  <audio id="audio-player" src="./sample/sample_audio.mp3" crossorigin="anonymous"></audio>
  <script type="module" src="/src/simple.ts"></script>
</body>
</html>
